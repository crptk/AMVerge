name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  check:
    name: Build checks
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Create backend venv + install Python dependencies
        shell: pwsh
        run: |
          python -m venv backend/venv
          backend/venv/Scripts/python -m pip install --upgrade pip
          backend/venv/Scripts/python -m pip install pyinstaller av pillow numpy

      - name: Install FFmpeg
        shell: pwsh
        run: |
          choco install ffmpeg -y
          New-Item -ItemType Directory -Force backend/bin | Out-Null

          $ffmpegReal = "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe"
          $ffprobeReal = "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffprobe.exe"

          if (-not (Test-Path $ffmpegReal) -or -not (Test-Path $ffprobeReal)) {
            Write-Host "Real ffmpeg binaries not found at expected Chocolatey path."
            Get-ChildItem "C:\ProgramData\chocolatey\lib\ffmpeg" -Recurse -File -Filter ffmpeg.exe | Format-Table -AutoSize
            Get-ChildItem "C:\ProgramData\chocolatey\lib\ffmpeg" -Recurse -File -Filter ffprobe.exe | Format-Table -AutoSize
            exit 1
          }

          Copy-Item $ffmpegReal backend/bin/ffmpeg.exe -Force
          Copy-Item $ffprobeReal backend/bin/ffprobe.exe -Force
          & backend/bin/ffmpeg.exe -version | Select-Object -First 1
          & backend/bin/ffprobe.exe -version | Select-Object -First 1
          
      - name: Build Python sidecar
        working-directory: frontend
        run: node scripts/build-sidecar.mjs

      - name: Verify sidecar exists
        shell: pwsh
        run: |
          dir frontend/src-tauri/bin/backend_script-x86_64-pc-windows-msvc

      - name: Check frontend build
        working-directory: frontend
        run: npm run build

      - name: Check Rust/Tauri compile
        working-directory: frontend/src-tauri
        run: cargo check